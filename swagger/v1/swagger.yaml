  "/api/v1/cdn_configurations":
    get:
      summary: Retrieve CDN configuration for all supported providers
      tags:
      - CDN & Settings
      security:
      - Bearer: []
      description: |
        Returns the active CDN configuration for Fastly, Cloudflare, and Akamai.
        **Secrets are masked** in the response — only the last 4 characters of
        each secret value are visible (e.g. `••••••••k9Xz`). To update a
        provider, use `PUT /api/v1/cdn_configurations`.
      responses:
        '200':
          description: CDN configurations returned (secrets masked)
          content:
            application/json:
              schema:
                type: object
                properties:
                  fastly:
                    type: object
                    properties:
                      is_active:
                        type: boolean
                      settings:
                        type: object
                        description: Provider-specific settings with secrets masked
                  cloudflare:
                    type: object
                    properties:
                      is_active:
                        type: boolean
                      settings:
                        type: object
                  akamai:
                    type: object
                    properties:
                      is_active:
                        type: boolean
                      settings:
                        type: object
    put:
      summary: Update CDN configuration for a provider
      tags:
      - CDN & Settings
      security:
      - Bearer: []
      description: |
        Creates or updates the `CdnConfiguration` for the specified `provider`.
        Values containing `••••` (the masking sentinel) are automatically
        excluded from the update to prevent overwriting stored secrets with
        masked placeholder values returned by the GET endpoint.
      parameters: []
      responses:
        '200':
          description: CDN configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: Fastly configuration updated.
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - provider
              properties:
                provider:
                  type: string
                  example: fastly
                  description: fastly | cloudflare | akamai
                is_active:
                  type: boolean
                  example: true
                settings:
                  type: object
                  description: Provider-specific key-value settings (e.g. service_id,
                    api_key)
                  example:
                    service_id: svc_abc123
                    api_key: sk_live_xyz
  "/api/v1/collection_settings":
    get:
      summary: Retrieve global collection / workspace settings
      tags:
      - Tools - Collection Settings
      security:
      - Bearer: []
      description: |
        Returns the global configuration defaults applied to all new collections
        and smart workspaces. Falls back to built-in defaults when no settings
        have been explicitly persisted.
      responses:
        '200':
          description: Settings returned
          content:
            application/json:
              schema:
                type: object
                required:
                - default_similarity_threshold
                - default_visibility
                - max_assets_per_collection
                - auto_cdn_purge
                - smart_rule_schedule
                - ttl_default_days
                - enable_compliance_scan
                properties:
                  default_similarity_threshold:
                    type: number
                    format: float
                    example: 0.8
                    description: Cosine similarity threshold used for new smart collections
                      (0.5 – 0.99)
                  default_visibility:
                    type: string
                    example: public
                    enum:
                    - public
                    - private
                    description: Default access level for newly created collections
                  max_assets_per_collection:
                    type: integer
                    example: 500
                    description: 0 = unlimited
                  auto_cdn_purge:
                    type: boolean
                    example: true
                    description: Invalidate CDN edge cache on every collection modification
                  smart_rule_schedule:
                    type: string
                    example: daily
                    enum:
                    - hourly
                    - daily
                    - weekly
                    - manual
                    description: How often the AI engine re-evaluates active smart
                      rules
                  ttl_default_days:
                    type: integer
                    example: 0
                    description: 0 = no default TTL; positive values auto-archive
                      after N days
                  enable_compliance_scan:
                    type: boolean
                    example: false
                    description: Run automated TDM usage-rights scan after each collection
                      modification
    put:
      summary: Update global collection / workspace settings (admin only)
      tags:
      - Tools - Collection Settings
      security:
      - Bearer: []
      description: |
        Persists new global defaults for collection and workspace behaviour.
        Partial updates are supported — only the keys provided will be changed.

        **Requires administrator privileges.**
      parameters: []
      responses:
        '200':
