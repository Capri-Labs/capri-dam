  "/oauth/token":
    post:
      summary: Requests an OAuth Access Token (Client Credentials Grant)
      tags:
      - Authorization (OAuth 2.0)
      description: "        This is the primary authentication endpoint for System
        Accounts and external integrations. \n        It converts your **Client ID**
        and **Client Secret** into a temporary **Bearer Access Token**.\n\n        This
        token must be included in the header of all subsequent API requests as:\n
        \       `Authorization: Bearer <your_access_token>`\n"
      parameters: []
      responses:
        '200':
          description: access token issued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: eyJhY2Nlc3NfdG9rZW4iOiJl...
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 7200
                    description: Time in seconds until expiration.
                  scope:
                    type: string
                    example: read write
                  created_at:
                    type: integer
                    example: 1716912345
                required:
                - access_token
                - token_type
                - expires_in
        '401':
          description: unauthorized (invalid credentials)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid_client
                  error_description:
                    type: string
                    example: Client authentication failed.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: string
        required: true
        description: Must always be set to `client_credentials` for System Accounts.
