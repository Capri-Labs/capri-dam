  "/api/v1/assets/{id}/process_image":
    parameters:
    - name: id
      in: path
      required: true
      description: Asset ID
      schema:
        type: string
    post:
      summary: Apply non-destructive image edits via the baking pipeline
      tags:
      - Assets
      security:
      - Bearer: []
      description: |
        Runs the **Image Baking Pipeline** (ImageMagick/MiniMagick).

        **Save Modes**:
        - `version` — creates a new immutable version on the same asset (default)
        - `overwrite` — replaces the active version in-place (**destructive**)
        - `new` — forks the asset as an independent copy (`title (Copy)`)

        When `target_folder_id` differs from the current folder and `save_mode` is
        `version` or `new`, the result is placed in that target folder.
      parameters: []
      responses:
        '200':
          description: Image baked — overwrite or in-place version save
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  uuid:
                    type: string
                    format: uuid
                  title:
                    type: string
                  version:
                    type: integer
                  metadata:
                    type: object
                  url:
                    type: string
                    nullable: true
        '201':
          description: Fork created — new asset or branch to target folder
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  uuid:
                    type: string
                    format: uuid
                  title:
                    type: string
                    example: Brand Logo Final (Copy)
                  version:
                    type: integer
                  metadata:
                    type: object
                  url:
                    type: string
                    nullable: true
        '422':
          description: Source file missing from disk
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                save_mode:
                  type: string
                  enum:
                  - version
                  - overwrite
                  - new
                  example: version
                target_folder_id:
                  type: string
                  nullable: true
                  example: '42'
                  description: Destination folder ID, or "root"
                adjustments:
                  type: object
                  properties:
                    brightness:
                      type: integer
                      example: 10
                    contrast:
                      type: integer
                      example: 5
                    saturation:
                      type: integer
                      example: -20
                geometry:
                  type: object
                  properties:
                    rotate:
                      type: integer
                      example: 90
                    flip_horizontal:
                      type: boolean
                      example: false
                    focal_point:
                      type: object
                      properties:
                        x:
                          type: number
                          example: 50.0
                        "y":
                          type: number
                          example: 50.0
                filter:
                  type: string
                  nullable: true
                  example: None
                custom_cli:
                  type: string
                  nullable: true
                  example: "-monochrome -charcoal 2"
                  description: Raw ImageMagick CLI flags. Use with caution.
