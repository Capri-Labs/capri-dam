---
openapi: 3.0.1
info:
  title: Capri DAM API
  version: v1
  description: |
    An enterprise-grade, cloud-agnostic Digital Asset Management system designed for zero noise operations and high-scale automation.

    ### Core Capabilities
    * **Asset Lifecycle Management**: Upload, process, and retrieve media assets asynchronously.
    * **Workflow Automation**: Configurable event-driven state machines for asset approval and metadata pipelines.
    * **Operational Governance**: Granular role-based access control (RBAC), hierarchical user groups, and comprehensive administrative oversight.
    * **Cloud-Agnostic Storage**: Plug-and-play architecture supporting AWS S3, Cloudflare R2, Google Cloud Storage, and local environments.

    ### Authentication
    This API utilizes OAuth 2.0 for secure access. System-to-system integrations should utilize the Client Credentials grant type.

    1. Call `POST /oauth/token` with your `client_id` and `client_secret`.
    2. Click the **Authorize** button on this page and enter the resulting token.
  termsOfService: https://github.com/Capri-Labs/capri-dam
  contact:
    name: Ashok Pelluru | Operational Governance & Architecture
    url: https://github.com/Capri-Labs/capri-dam
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
paths:
  "/admin/email_templates":
    get:
      summary: Retrieves a list of all email templates
      tags:
      - Admin - Email Templates
      security:
      - Bearer: []
      responses:
        '200':
          description: email templates retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  email_templates:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        event_trigger:
                          type: string
                        subject:
                          type: string
                        active:
                          type: boolean
                        updated_at:
                          type: string
    post:
      summary: Creates a new email template
      tags:
      - Admin - Email Templates
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email_template:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Welcome Email
                    event_trigger:
                      type: string
                      example: user_created
                    subject:
                      type: string
                      example: Welcome to Capri DAM
                    html_body:
                      type: string
                      example: "<h1>Welcome {{first_name}}</h1>"
                    text_body:
                      type: string
                      example: Welcome {{first_name}}
                    active:
                      type: boolean
                      example: true
                  required:
                  - name
                  - event_trigger
                  - subject
              required:
              - email_template
  "/admin/email_templates/{id}":
    parameters:
    - name: id
      in: path
      description: Email Template ID
      required: true
      schema:
        type: string
    get:
      summary: Retrieves details of a specific email template
      tags:
      - Admin - Email Templates
      security:
      - Bearer: []
      responses:
        '200':
          description: template details retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  email_template:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      event_trigger:
                        type: string
                      subject:
                        type: string
                      html_body:
                        type: string
                      text_body:
                        type: string
                      active:
                        type: boolean
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
    patch:
      summary: Updates an existing email template
      tags:
      - Admin - Email Templates
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: update failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email_template:
                  type: object
                  properties:
                    name:
                      type: string
                    event_trigger:
                      type: string
                    subject:
                      type: string
                    html_body:
                      type: string
                    text_body:
                      type: string
                    active:
                      type: boolean
    delete:
      summary: Deletes an email template
      tags:
      - Admin - Email Templates
      security:
      - Bearer: []
      responses:
        '200':
          description: deletion failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: string
  "/admin/user_groups":
    get:
      summary: Retrieves all user groups with hierarchy metadata
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      responses:
        '200':
          description: user groups retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_groups:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        slug:
                          type: string
                          nullable: true
                        description:
                          type: string
                          nullable: true
                        is_system:
                          type: boolean
                        parent_id:
                          type: integer
                          nullable: true
                        member_count:
                          type: integer
    post:
      summary: Creates a new user group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      parameters: []
      responses:
        '201':
          description: user group created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  group:
                    "$ref": "#/components/schemas/UserGroup"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - user_group
              properties:
                user_group:
                  type: object
                  required:
                  - name
                  properties:
                    name:
                      type: string
                      example: Marketing Team
                    description:
                      type: string
                      example: Global marketing and content creators
                parent_id:
                  type: integer
                  nullable: true
                  description: Optional — nests this group under a parent
  "/admin/user_groups/{id}":
    parameters:
    - name: id
      in: path
      description: User Group ID
      required: true
      schema:
        type: string
    get:
      summary: Retrieves a single group with members and sub-groups
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      responses:
        '200':
          description: group retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    "$ref": "#/components/schemas/UserGroup"
        '404':
          description: group not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    patch:
      summary: Updates a group name or description
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: group updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  group:
                    type: object
        '403':
          description: forbidden — only super-admins can modify administrators group
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_group:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
    delete:
      summary: Deletes a non-system group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      responses:
        '200':
          description: group deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '403':
          description: system groups cannot be deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/admin/user_groups/{id}/add_member":
    parameters:
    - name: id
      in: path
      description: User Group ID
      required: true
      schema:
        type: string
    post:
      summary: Adds a user member to the group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: user added to group
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '403':
          description: cannot add users to everyone or administrators without super-admin
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: user not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: employee@example.com
                  description: Look up by email (preferred)
                user_id:
                  type: integer
                  example: 42
                  description: Alternatively look up by ID
  "/admin/user_groups/{id}/remove_member":
    parameters:
    - name: id
      in: path
      description: User Group ID
      required: true
      schema:
        type: string
    delete:
      summary: Removes a user from the group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: user removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '403':
          description: cannot remove users from everyone group
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - user_id
              properties:
                user_id:
                  type: integer
                  example: 42
  "/admin/user_groups/{id}/add_group_member":
    parameters:
    - name: id
      in: path
      description: Parent Group ID
      required: true
      schema:
        type: string
    post:
      summary: Nests a child group inside this group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: sub-group added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          description: parent or child group not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '422':
          description: validation failed (e.g. circular nesting)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - child_group_id
              properties:
                child_group_id:
                  type: integer
                  description: ID of the group to nest
  "/admin/user_groups/{id}/remove_group_member":
    parameters:
    - name: id
      in: path
      description: Parent Group ID
      required: true
      schema:
        type: string
    delete:
      summary: Removes a child group from this group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: sub-group removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - child_group_id
              properties:
                child_group_id:
                  type: integer
  "/admin/user_groups/{id}/add_user":
    parameters:
    - name: id
      in: path
      description: User Group ID
      required: true
      schema:
        type: string
    post:
      summary: "(Deprecated) Adds a user via email — use add_member instead"
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: user added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              properties:
                email:
                  type: string
  "/admin/users":
    get:
      summary: Retrieves a list of all users
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        email:
                          type: string
                        display_name:
                          type: string
                          nullable: true
                        first_name:
                          type: string
                        last_name:
                          type: string
                        department:
                          type: string
                          nullable: true
                        role:
                          type: string
                          nullable: true
                        avatar_url:
                          type: string
                          nullable: true
                        sso_managed:
                          type: boolean
                        admin:
                          type: boolean
                        provider:
                          type: string
                          nullable: true
                        active:
                          type: boolean
                        created_at:
                          type: string
                        groups:
                          type: array
                          items:
                            type: string
                        group_ids:
                          type: array
                          items:
                            type: integer
    post:
      summary: Creates a new user
      tags:
      - Admin - Users
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: user created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  user:
                    "$ref": "#/components/schemas/User"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: new_hire@example.com
                    first_name:
                      type: string
                      example: Jane
                    last_name:
                      type: string
                      example: Doe
                    department:
                      type: string
                      example: Marketing
                    role:
                      type: string
                      example: viewer
                    admin:
                      type: boolean
                      example: false
                    user_group_ids:
                      type: array
                      items:
                        type: integer
                      example:
                      - 1
                      - 2
                  required:
                  - email
                  - first_name
                  - last_name
  "/admin/users/{id}":
    parameters:
    - name: id
      in: path
      description: User ID
      required: true
      schema:
        type: string
    get:
      summary: Retrieves a single user (with impersonators and preferences)
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: user retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    "$ref": "#/components/schemas/User"
        '404':
          description: user not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    patch:
      summary: Updates an existing user
      tags:
      - Admin - Users
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: user updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '403':
          description: forbidden (unauthorized admin modification)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    first_name:
                      type: string
                    last_name:
                      type: string
                    department:
                      type: string
                    role:
                      type: string
                    admin:
                      type: boolean
                    user_group_ids:
                      type: array
                      items:
                        type: integer
    delete:
      summary: Deactivates a user (soft delete)
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: user deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
  "/admin/users/{id}/toggle_status":
    parameters:
    - name: id
      in: path
      description: User ID
      required: true
      schema:
        type: string
    post:
      summary: Toggles a user between active and suspended states
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: status toggled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  active:
                    type: boolean
  "/admin/users/{id}/change_password":
    parameters:
    - name: id
      in: path
      description: User ID
      required: true
      schema:
        type: string
    post:
      summary: Changes a local user password (admin initiated)
      tags:
      - Admin - Users
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: password updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '422':
          description: SSO accounts cannot have password changed here
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - new_password
              - new_password_confirmation
              properties:
                new_password:
                  type: string
                  example: NewSecure#123
                new_password_confirmation:
                  type: string
                  example: NewSecure#123
                force_change:
                  type: boolean
                  example: false
                  description: When true the user must change on next login
  "/admin/users/{id}/groups":
    parameters:
    - name: id
      in: path
      description: User ID
      required: true
      schema:
        type: string
    get:
      summary: Lists the groups this user belongs to
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: groups retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        slug:
                          type: string
                          nullable: true
                        is_system:
                          type: boolean
  "/admin/users/{id}/impersonators":
    parameters:
    - name: id
      in: path
      description: User ID
      required: true
      schema:
        type: string
    get:
      summary: Lists users allowed to impersonate this account
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: impersonators retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  impersonators:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        display_name:
                          type: string
                        email:
                          type: string
    post:
      summary: Grants impersonation access to another user
      tags:
      - Admin - Users
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: impersonation access granted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '422':
          description: self-impersonation or duplicate grant
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - impersonator_id
              properties:
                impersonator_id:
                  type: integer
                  description: ID of the user to grant impersonation to
  "/admin/users/{id}/impersonators/{impersonator_id}":
    parameters:
    - name: id
      in: path
      description: User ID
      required: true
      schema:
        type: string
    - name: impersonator_id
      in: path
      description: Impersonator User ID
      required: true
      schema:
        type: string
    delete:
      summary: Revokes impersonation access
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: impersonation access revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
  "/admin/users/{id}/preferences":
    parameters:
    - name: id
      in: path
      description: User ID
      required: true
      schema:
        type: string
    get:
      summary: Retrieves user preferences (language, notifications)
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: preferences retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences:
                    type: object
                    properties:
                      language:
                        type: string
                        example: en
                      receive_mention_emails:
                        type: boolean
                      receive_workflow_emails:
                        type: boolean
    patch:
      summary: Updates user preferences
      tags:
      - Admin - Users
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: preferences updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  preferences:
                    type: object
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                preferences:
                  type: object
                  properties:
                    language:
                      type: string
                      example: de
                    receive_mention_emails:
                      type: boolean
                    receive_workflow_emails:
                      type: boolean
  "/api/v1/agent_workflows":
    get:
      summary: List all agent workflows
      tags:
      - AI Agents
      security:
      - Bearer: []
      description: Returns every agent workflow with computed reliability/latency
        stats. Available to any authenticated user.
      responses:
        '200':
          description: Workflows returned
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/AgentWorkflow"
    post:
      summary: Create an agent workflow (admin only)
      tags:
      - AI Agents
      security:
      - Bearer: []
      parameters: []
      responses:
        '201':
          description: Workflow created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AgentWorkflow"
        '422':
          description: Validation failed
        '403':
          description: Non-admin forbidden
      requestBody:
        content:
          application/json:
            schema:
              type: object
