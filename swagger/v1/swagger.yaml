---
openapi: 3.0.1
info:
  title: Capri DAM API
  version: v1
  description: |
    An enterprise-grade, cloud-agnostic Digital Asset Management system designed for zero noise operations and high-scale automation.

    ### Core Capabilities
    * **Asset Lifecycle Management**: Upload, process, and retrieve media assets asynchronously.
    * **Workflow Automation**: Configurable event-driven state machines for asset approval and metadata pipelines.
    * **Operational Governance**: Granular role-based access control (RBAC), hierarchical user groups, and comprehensive administrative oversight.
    * **Cloud-Agnostic Storage**: Plug-and-play architecture supporting AWS S3, Cloudflare R2, Google Cloud Storage, and local environments.

    ### Authentication
    This API utilizes OAuth 2.0 for secure access. System-to-system integrations should utilize the Client Credentials grant type.

    1. Call `POST /oauth/token` with your `client_id` and `client_secret`.
    2. Click the **Authorize** button on this page and enter the resulting token.
  termsOfService: https://github.com/Capri-Labs/capri-dam
  contact:
    name: Ashok Pelluru | Operational Governance & Architecture
    url: https://github.com/Capri-Labs/capri-dam
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
paths:
  "/api/v1/folders":
    get:
      summary: Retrieve the full folder tree (flat list with paths)
      tags:
      - Folders
      security:
      - Bearer: []
      description: |
        Returns every active folder as a flat sorted list with fully-qualified
        path names (e.g. `/Marketing/2026/Campaigns`). Used to populate folder-
        picker dropdowns across the UI. Built in O(n) using a single query + in-
        memory tree traversal — safe for large folder structures.
      responses:
        '200':
          description: Folders retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  folders:
                    type: array
                    items:
                      type: object
                      required:
                      - id
                      - name
                      properties:
                        id:
                          type: integer
                          example: 42
                        name:
                          type: string
                          example: "/Marketing/2026"
    post:
      summary: Create a new folder
      tags:
      - Folders
      security:
      - Bearer: []
      parameters: []
      responses:
        '201':
          description: Folder created successfully
        '422':
          description: Validation failed (e.g., blank name)
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - folder
              properties:
                folder:
                  type: object
                  required:
                  - name
                  properties:
                    name:
                      type: string
                      example: Q3 Campaigns
                    parent_id:
                      type: string
                      nullable: true
                      example: root
                      description: Parent folder ID or "root" to create at top level
  "/api/v1/folders/{id}":
    parameters:
    - name: id
      in: path
      required: true
      description: Folder ID or the string `"root"` to browse the top level
      schema:
        type: string
    - name: sort
      in: query
      required: false
      enum:
      - name
      - created_at
      - updated_at
      - size
      - type
      description: Field to sort folders & assets by. Defaults to `name`. `size` and
        `type` apply to assets only (folders fall back to `name`).
      schema:
        type: string
    - name: direction
      in: query
      required: false
      enum:
      - asc
      - desc
      description: Sort direction. Defaults to `asc`.
      schema:
        type: string
    get:
      summary: Retrieve a folder and its direct child contents
      tags:
      - Folders
      security:
      - Bearer: []
      description: |
        Returns immediate sub-folders, assets in this folder, and the breadcrumb
        trail back to root. Pass `id=root` to list all top-level items.
        Only active (non-trashed) items are returned.

        Results can be ordered with the `sort` and `direction` query parameters.
        Supported sort fields: `name`, `created_at`, `updated_at`, `size`, `type`.
        Note that `size` and `type` are asset-only fields — folders fall back to
        `name` ordering for those values.
      responses:
        '200':
          description: Folder contents returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  folders:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        slug:
                          type: string
                          nullable: true
                        description:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  assets:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        uuid:
                          type: string
                          format: uuid
                        title:
                          type: string
                        status:
                          type: string
                          example: ready
                        version:
                          type: integer
                        properties:
                          type: object
                        size:
                          type: integer
                          description: File size in bytes (from active version)
                        content_type:
                          type: string
                          nullable: true
                          example: image/jpeg
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        url:
                          type: string
                          nullable: true
                  breadcrumbs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                  sort:
                    type: object
                    properties:
                      field:
                        type: string
                        example: name
                      direction:
                        type: string
                        example: asc
        '404':
          description: Folder not found or has been deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    patch:
      summary: Rename a folder and/or update its description
      tags:
      - Folders
      security:
      - Bearer: []
      description: |
        Updates the folder `name` (rename) and/or `description`. The URL-safe
        `slug` is regenerated automatically when the name changes.
      parameters: []
      responses:
        '200':
          description: Folder updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  description:
                    type: string
                    nullable: true
                  slug:
                    type: string
                    nullable: true
                  updated_at:
                    type: string
                    format: date-time
        '404':
          description: Folder not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '422':
          description: Validation failed (e.g., blank name)
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - folder
              properties:
                folder:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Q4 Campaigns
                    description:
                      type: string
                      example: All creative assets for the Q4 push
    delete:
      summary: Move a folder to the Recycle Bin (soft delete)
      tags:
      - Folders
      security:
      - Bearer: []
      description: |
        Soft-deletes the folder by stamping `deleted_at`. A CDN invalidation job
        is dispatched to drop any cached assets under this folder from edge nodes.
        Use `POST /api/v1/folders/{id}/restore` to recover it.
      responses:
        '200':
          description: Folder moved to bin
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Folder moved to bin
  "/api/v1/folders/{id}/profiles":
    parameters:
    - name: id
      in: path
      required: true
      description: Folder ID
      schema:
        type: string
    get:
      summary: Retrieve all configuration profiles assigned to a folder
      tags:
      - Folders
      security:
      - Bearer: []
      description: |
        Returns the image processing profile, video encoding profile, metadata
        schema (direct or inherited), and access-control policies assigned to a
        folder. Powers the folder "Info" properties drawer. Any unassigned
        section returns `null`.
      responses:
        '200':
          description: Folder profiles returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  image_profile:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      crop_type:
                        type: string
                      unsharp_mask:
                        type: object
                        nullable: true
                      responsive_crop_enabled:
                        type: boolean
                      swatch_enabled:
                        type: boolean
                  video_profile:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      description:
                        type: string
                        nullable: true
                      encode_for_adaptive_streaming:
                        type: boolean
                      preset_count:
                        type: integer
                  metadata_schema:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      source:
                        type: string
                        enum:
                        - direct
                        - inherited
                        description: Whether the schema is set on this folder or inherited
                          from an ancestor
                      tabs:
                        type: array
                        items:
                          type: object
                  policies:
                    type: array
                    items:
                      type: object
                      properties:
                        group_id:
                          type: integer
                        group_name:
                          type: string
                          nullable: true
                        read:
                          type: boolean
                        write:
                          type: boolean
                        delete:
                          type: boolean
                        manage:
                          type: boolean
                        deny:
                          type: boolean
  "/api/v1/folders/{id}/restore":
    parameters:
    - name: id
      in: path
      required: true
      description: Folder ID
      schema:
        type: string
    post:
      summary: Restore a soft-deleted folder from the Recycle Bin
      tags:
      - Folders
      security:
      - Bearer: []
      responses:
        '200':
          description: Folder restored to active state
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Folder restored
        '404':
          description: Folder not found in the bin
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/v1/folders/{id}/permanent":
    parameters:
    - name: id
      in: path
      required: true
      description: Folder ID
      schema:
        type: string
    delete:
      summary: Permanently delete a folder from the Recycle Bin
      tags:
      - Folders
      security:
      - Bearer: []
      description: |
        **Irreversible.** Destroys the folder database record. Also dispatches a
        CDN invalidation job to drop any cached assets under this folder from
        edge nodes. Assets inside the folder should be permanently deleted
        separately (or handled by `dependent: :destroy` on the model association).
      responses:
        '200':
          description: Folder permanently deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Folder permanently deleted
        '404':
          description: Folder not found in the bin
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/admin/users":
    get:
      summary: List all DAM users
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
    post:
      summary: Create a new local user
      tags:
      - Admin - Users
      security:
      - Bearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                user:
                  type: object
                  required: [email, first_name, last_name]
                  properties:
                    email:          { type: string }
                    first_name:     { type: string }
                    last_name:      { type: string }
                    department:     { type: string }
                    role:           { type: string, default: viewer }
                    admin:          { type: boolean, default: false }
                    user_group_ids: { type: array, items: { type: integer } }
      responses:
        '200':
          description: User created (temp password emailed to user)
        '422':
          description: Validation failed
  "/admin/users/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    get:
      summary: Retrieve a single user with tabs data
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
    patch:
      summary: Update user properties
      tags:
      - Admin - Users
      security:
      - Bearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    first_name:     { type: string }
                    last_name:      { type: string }
                    department:     { type: string }
                    role:           { type: string }
                    admin:          { type: boolean }
                    user_group_ids: { type: array, items: { type: integer } }
      responses:
        '200':
          description: Updated
        '403':
          description: Forbidden
    delete:
      summary: Deactivate (soft-delete) a user
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: Deactivated
  "/admin/users/{id}/toggle_status":
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    post:
      summary: Toggle active/suspended state
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: Status toggled
  "/admin/users/{id}/change_password":
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    post:
      summary: Change a local user's password (admin initiated)
      tags:
      - Admin - Users
      security:
      - Bearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [new_password, new_password_confirmation]
              properties:
                new_password:              { type: string }
                new_password_confirmation: { type: string }
                force_change:              { type: boolean, default: false }
      responses:
        '200':
          description: Password updated
        '422':
          description: SSO accounts cannot have password changed here
  "/admin/users/{id}/groups":
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    get:
      summary: List groups this user belongs to
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: Groups list
  "/admin/users/{id}/impersonators":
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    get:
      summary: List users allowed to impersonate this account
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: Impersonators list
    post:
      summary: Grant impersonation access to another user
      tags:
      - Admin - Users
      security:
      - Bearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [impersonator_id]
              properties:
                impersonator_id: { type: integer }
      responses:
        '200':
          description: Access granted
        '422':
          description: Self-impersonation or duplicate grant
  "/admin/users/{id}/impersonators/{impersonator_id}":
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    - name: impersonator_id
      in: path
      required: true
      schema: { type: integer }
    delete:
      summary: Revoke impersonation access
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: Revoked
  "/admin/users/{id}/preferences":
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    get:
      summary: Get user preferences (language, notifications)
      tags:
      - Admin - Users
      security:
      - Bearer: []
      responses:
        '200':
          description: Preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences: { $ref: '#/components/schemas/UserPreference' }
    patch:
      summary: Update user preferences
      tags:
      - Admin - Users
      security:
      - Bearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                preferences:
                  type: object
                  properties:
                    language:                { type: string, example: de }
                    receive_mention_emails:  { type: boolean }
                    receive_workflow_emails: { type: boolean }
      responses:
        '200':
          description: Updated
  "/admin/user_groups":
    get:
      summary: List all user groups
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      description: |
        Returns all groups including built-in system groups.
        System groups: **everyone**, **administrators**, **super-administrators**.
        These groups cannot be deleted (deletable: false).
      responses:
        '200':
          description: User groups list
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_groups:
                    type: array
                    items: { $ref: '#/components/schemas/UserGroup' }
    post:
      summary: Create a new user group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [user_group]
              properties:
                user_group:
                  type: object
                  required: [name]
                  properties:
                    name:        { type: string }
                    description: { type: string }
                parent_id: { type: integer, nullable: true }
      responses:
        '201':
          description: Created
        '422':
          description: Validation failed
  "/admin/user_groups/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    get:
      summary: Get a single group with members and sub-groups
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      responses:
        '200':
          description: Group detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  group: { $ref: '#/components/schemas/UserGroup' }
    patch:
      summary: Update group name or description
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      description: |
        System groups have restrictions:
        - **everyone**: immutable (no changes)
        - **administrators**: only super-admins can modify
        - **super-administrators**: only super-admins can modify
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_group:
                  type: object
                  properties:
                    name:        { type: string }
                    description: { type: string }
      responses:
        '200':
          description: Updated
        '403':
          description: Forbidden
    delete:
      summary: Delete a non-system group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      description: System groups (everyone, administrators, super-administrators) cannot be deleted.
      responses:
        '200':
          description: Deleted
        '403':
          description: System groups cannot be deleted
  "/admin/user_groups/{id}/add_member":
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    post:
      summary: Add a user to the group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:   { type: string }
                user_id: { type: integer }
      responses:
        '200':
          description: User added
        '403':
          description: Forbidden (everyone group or administrators without super-admin)
        '404':
          description: User not found
  "/admin/user_groups/{id}/remove_member":
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    delete:
      summary: Remove a user from the group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: integer }
      responses:
        '200':
          description: Removed
        '403':
          description: Cannot remove from everyone group
  "/admin/user_groups/{id}/add_group_member":
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    post:
      summary: Nest a child group inside this group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [child_group_id]
              properties:
                child_group_id: { type: integer }
      responses:
        '200':
          description: Sub-group added
  "/admin/user_groups/{id}/remove_group_member":
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: integer }
    delete:
      summary: Remove a child group from this group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [child_group_id]
              properties:
                child_group_id: { type: integer }
      responses:
        '200':
          description: Sub-group removed
  "/admin/folders/{folder_id}/folder_policies":
    parameters:
    - name: folder_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    get:
      summary: List explicit and inherited ACL policies for a folder
      tags:
      - Admin - Permissions (ACL)
      security:
      - Bearer: []
      description: |
        Returns the full permission matrix for every group that has an entry
        on this folder, plus inherited rules from parent folders.

        **Actions:** Read | Modify | Create | Delete | Replicate | Manage

        **explicit_deny** short-circuits all positive grants — even Administrators
        are blocked (the only exception is if they are in the built-in
        administrators group which always bypasses deny rules).
      responses:
        '200':
          description: Policies retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  folder_name:
                    type: string
                  explicit_policies:
                    type: array
                    items: { $ref: '#/components/schemas/FolderPolicy' }
                  inherited_policies:
                    type: array
                    items: { $ref: '#/components/schemas/FolderPolicy' }
    post:
      summary: Create or update a folder ACL entry for a group
      tags:
      - Admin - Permissions (ACL)
      security:
      - Bearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [group_id, policy]
              properties:
                group_id: { type: integer }
                policy:
                  type: object
                  properties:
                    read_access:      { type: boolean }
                    modify_access:    { type: boolean }
                    create_access:    { type: boolean }
                    delete_access:    { type: boolean }
                    replicate_access: { type: boolean }
                    manage_access:    { type: boolean }
                    explicit_deny:    { type: boolean }
      responses:
        '200':
          description: Policy saved
        '422':
          description: Validation failed
  "/admin/folders/{folder_id}/folder_policies/{group_id}":
    parameters:
    - name: folder_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    - name: group_id
      in: path
      required: true
      schema: { type: integer }
    delete:
      summary: Remove an explicit ACL entry (reverts to inherited)
      tags:
      - Admin - Permissions (ACL)
      security:
      - Bearer: []
      responses:
        '200':
          description: Policy removed
servers:
- url: http://localhost:3000
  description: Local Development Server
- url: https://api.yourdam.com
  description: Production Environment
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      description: Enter your OAuth 2.0 Bearer token to authenticate requests.
  schemas:
    User:
      type: object
      properties:
        id:           { type: integer }
        email:        { type: string }
        username:     { type: string, nullable: true }
        display_name: { type: string }
        first_name:   { type: string, nullable: true }
        last_name:    { type: string, nullable: true }
        department:   { type: string, nullable: true }
        role:         { type: string }
        avatar_url:   { type: string, nullable: true }
        admin:        { type: boolean }
        active:       { type: boolean }
        sso_managed:  { type: boolean }
        provider:     { type: string, nullable: true }
        created_at:   { type: string, format: date-time }
        groups:
          type: array
          items: { type: string }
        group_ids:
          type: array
          items: { type: integer }
        impersonators:
          type: array
          items:
            type: object
            properties:
              id:           { type: integer }
              display_name: { type: string }
              email:        { type: string }
        preferences:
          $ref: '#/components/schemas/UserPreference'
    UserPreference:
      type: object
      properties:
        language:                { type: string, example: en }
        receive_mention_emails:  { type: boolean }
        receive_workflow_emails: { type: boolean }
    UserGroup:
      type: object
      properties:
        id:           { type: integer }
        name:         { type: string }
        slug:         { type: string, nullable: true }
        description:  { type: string, nullable: true }
        is_system:    { type: boolean }
        deletable:    { type: boolean }
        parent_id:    { type: integer, nullable: true }
        member_count: { type: integer }
        created_at:   { type: string, format: date-time }
        members:
          type: array
          items:
            type: object
            properties:
              id:           { type: integer }
              display_name: { type: string }
              email:        { type: string }
              avatar_url:   { type: string, nullable: true }
        child_groups:
          type: array
          items:
            type: object
            properties:
              id:   { type: integer }
              name: { type: string }
              slug: { type: string, nullable: true }
    FolderPolicy:
      type: object
      description: |
        ACL entry for a (group, folder) pair.
        Actions: Read | Modify | Create | Delete | Replicate | Manage
        A single explicit_deny overrides all positive grants for the group.
      properties:
        id:            { type: integer }
        folder_id:     { type: string }
        group_id:      { type: integer }
        group_name:    { type: string }
        inherited:     { type: boolean }
        source_folder: { type: string, nullable: true }
        matrix:
          type: object
          properties:
            read:         { type: boolean }
            modify:       { type: boolean }
            create:       { type: boolean }
            delete:       { type: boolean }
            replicate:    { type: boolean }
            manage:       { type: boolean }
            explicit_deny: { type: boolean }

