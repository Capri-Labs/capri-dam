  "/api/v1/upload_restrictions":
    get:
      summary: Retrieve the current upload MIME-type restriction list
      tags:
      - Tools - Upload Restrictions
      security:
      - Bearer: []
      description: |
        Returns the configured list of allowed MIME types for asset uploads.
        An empty array means **all file types are permitted** (no restrictions active).
        Supports wildcards, e.g. `image/*` to allow all image formats.
      responses:
        '200':
          description: restriction list returned
          content:
            application/json:
              schema:
                type: object
                required:
                - allowed_mime_types
                properties:
                  allowed_mime_types:
                    type: array
                    items:
                      type: string
                    example:
                    - image/*
                    - application/pdf
                    description: Active allowlist. Empty = unrestricted.
    put:
      summary: Update the upload MIME-type restriction list (admin only)
      tags:
      - Tools - Upload Restrictions
      security:
      - Bearer: []
      description: |
        Persists a new MIME-type allowlist to the system settings store.
        Passing an empty array **disables all restrictions** so every file type is accepted.

        **Requires administrator privileges.**

        | Pattern | Effect |
        |---------|--------|
        | `image/*` | All image types (JPEG, PNG, WebP, …) |
        | `image/jpeg` | Only JPEG files |
        | `application/pdf` | Only PDF files |
      parameters: []
      responses:
        '200':
          description: restrictions saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  allowed_mime_types:
                    type: array
                    items:
                      type: string
                  message:
                    type: string
                    example: Upload restrictions saved successfully.
        '403':
          description: forbidden – admin privileges required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Administrator privileges required.
        '422':
          description: unprocessable entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - allowed_mime_types
              properties:
                allowed_mime_types:
                  type: array
                  items:
                    type: string
                  example:
                  - image/*
                  - application/pdf
                  description: New allowlist. Pass [] to remove all restrictions.
