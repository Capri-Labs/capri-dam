---
openapi: 3.0.1
info:
  title: Capri DAM API
  version: v1
  description: |
    An enterprise-grade, cloud-agnostic Digital Asset Management system designed for zero noise operations and high-scale automation.

    ### Core Capabilities
    * **Asset Lifecycle Management**: Upload, process, and retrieve media assets asynchronously.
    * **Workflow Automation**: Configurable event-driven state machines for asset approval and metadata pipelines.
    * **Operational Governance**: Granular role-based access control (RBAC), hierarchical user groups, and comprehensive administrative oversight.
    * **Cloud-Agnostic Storage**: Plug-and-play architecture supporting AWS S3, Cloudflare R2, Google Cloud Storage, and local environments.

    ### Authentication
    This API utilizes OAuth 2.0 for secure access. System-to-system integrations should utilize the Client Credentials grant type.

    1. Call `POST /oauth/token` with your `client_id` and `client_secret`.
    2. Click the **Authorize** button on this page and enter the resulting token.
  termsOfService: https://github.com/Capri-Labs/capri-dam
  contact:
    name: Ashok Pelluru | Operational Governance & Architecture
    url: https://github.com/Capri-Labs/capri-dam
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
paths:
  "/admin/email_templates":
    get:
      summary: Retrieves a list of all email templates
      tags:
      - Admin - Email Templates
      security:
      - Bearer: []
      responses:
        '200':
          description: email templates retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  email_templates:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        event_trigger:
                          type: string
                        subject:
                          type: string
                        active:
                          type: boolean
                        updated_at:
                          type: string
    post:
      summary: Creates a new email template
      tags:
      - Admin - Email Templates
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email_template:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Welcome Email
                    event_trigger:
                      type: string
                      example: user_created
                    subject:
                      type: string
                      example: Welcome to Capri DAM
                    html_body:
                      type: string
                      example: "<h1>Welcome {{first_name}}</h1>"
                    text_body:
                      type: string
                      example: Welcome {{first_name}}
                    active:
                      type: boolean
                      example: true
                  required:
                  - name
                  - event_trigger
                  - subject
              required:
              - email_template
  "/admin/email_templates/{id}":
    parameters:
    - name: id
      in: path
      description: Email Template ID
      required: true
      schema:
        type: string
    get:
      summary: Retrieves details of a specific email template
      tags:
      - Admin - Email Templates
      security:
      - Bearer: []
      responses:
        '200':
          description: template details retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  email_template:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      event_trigger:
                        type: string
                      subject:
                        type: string
                      html_body:
                        type: string
                      text_body:
                        type: string
                      active:
                        type: boolean
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
    patch:
      summary: Updates an existing email template
      tags:
      - Admin - Email Templates
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: update failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email_template:
                  type: object
                  properties:
                    name:
                      type: string
                    event_trigger:
                      type: string
                    subject:
                      type: string
                    html_body:
                      type: string
                    text_body:
                      type: string
                    active:
                      type: boolean
    delete:
      summary: Deletes an email template
      tags:
      - Admin - Email Templates
      security:
      - Bearer: []
      responses:
        '200':
          description: deletion failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: string
  "/admin/user_groups":
