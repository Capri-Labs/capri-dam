      summary: Deletes a non-system group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      responses:
        '200':
          description: group deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '403':
          description: system groups cannot be deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/admin/user_groups/{id}/add_member":
    parameters:
