  "/api/v1/copilot/search":
    post:
      summary: Semantic (vector) search powered by the AI Gateway
      tags:
      - AI Copilot
      security:
      - Bearer: []
      description: |
        Translates a natural-language query into a 1536-dimension vector via the
        Python AI Gateway (`POST /api/embed_query`) and performs an HNSW nearest-
        neighbour search using pgvector. Returns the top 20 most semantically
        similar assets regardless of filename or metadata text.

        **Requires the Python AI Gateway to be running** (default: `localhost:8000`).
        Falls back gracefully with a 500 response if the gateway is unavailable.

        Use this endpoint to power "find me something like…" search experiences
        in your product.
      parameters: []
      responses:
        '200':
          description: Semantic search results returned (may be empty array)
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        original_filename:
                          type: string
                        file_url:
                          type: string
                          nullable: true
                        properties:
                          type: object
        '500':
          description: AI Gateway is unreachable or returned an error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to process semantic query.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - query
              properties:
                query:
                  type: string
                  example: outdoor lifestyle photography with warm autumn tones
                  description: Natural language description of the assets you are
                    looking for
