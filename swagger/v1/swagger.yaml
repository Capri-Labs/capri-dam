        Returns storage utilisation figures and a prioritised list of technical-debt
        flags (orphaned assets, missing usage rights, stale media) that require
        remediation action.

        **Note:** In high-volume environments these metrics are cached in Redis and
        refreshed nightly to prevent excessive DB load.
      responses:
        '200':
          description: health metrics returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  storage:
                    type: object
                    properties:
                      total_allocated_tb:
                        type: number
                        example: 20.0
                      active_used_tb:
                        type: number
                        example: 4.32
                      orphaned_wasted_tb:
                        type: number
                        example: 0.12
                      duplicates_prevented_tb:
                        type: number
                        example: 0.85
                  debt_flags:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: d1
                        type:
                          type: string
                          example: orphaned
                        title:
                          type: string
                          example: Orphaned Legacy Assets
                        count:
                          type: integer
                          example: 142
                        impact:
                          type: string
                          enum:
                          - Critical
                          - High
                          - Medium
                          - Low
                          example: High
