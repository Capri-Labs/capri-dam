  "/api/v1/webhooks/connectors/{connector_id}/receive":
    parameters:
    - name: connector_id
      in: path
      required: true
      description: ID of the SystemConnector this webhook is bound to
      schema:
        type: integer
    post:
      summary: Receive an inbound webhook event from an external system
      tags:
      - Webhooks
      description: |
        **Machine-to-machine endpoint.** CSRF verification is disabled; all
        requests must include a valid HMAC-SHA256 signature header instead.

        **Signature Verification**:
        1. The body is hashed using `HMAC-SHA256` with the connector's stored `webhook_secret`.
        2. The result must be provided in one of:
           - `x-adobe-signature` (Adobe I/O events)
           - `x-hub-signature-256` (GitHub-style webhooks)

        Payloads are **not processed synchronously** — they are immediately handed
        to `IngestionWorker` via Sidekiq to keep web thread latency near zero.
        Always return `200 OK` from your webhook source system after this responds.
      parameters:
      - name: x-hub-signature-256
        in: header
        required: false
        description: HMAC-SHA256 signature for generic webhook providers
        schema:
          type: string
      - name: x-adobe-signature
        in: header
        required: false
        description: HMAC-SHA256 signature for Adobe I/O events
        schema:
          type: string
      responses:
        '200':
          description: Event accepted and queued for async processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: accepted
        '401':
          description: Invalid or missing webhook signature
        '404':
          description: Connector not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Provider-specific event payload (arbitrary JSON — passed
                through to IngestionWorker)
