    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Applies a Video Profile to a folder
      tags:
      - Tools - Video Profiles
      security:
      - Bearer: []
      parameters: []
      responses:
        '201':
          description: profile applied to folder
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile_id:
                    type: integer
                  folder_id:
                    type: string
        '400':
          description: missing folder_id
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '403':
          description: forbidden – admin only
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
