  "/api/v1/assets/local/{uuid}":
    parameters:
    - name: uuid
      in: path
      format: uuid
      required: true
      description: Asset UUID (public identifier — **not** the integer PK)
      schema:
        type: string
    get:
      summary: Stream the active-version file from local/staging storage
      tags:
      - Assets
      security:
      - Bearer: []
      description: Returned when `If-None-Match` matches the current `ETag`. No body
        is sent.
      responses:
        '200':
          description: File streamed inline
          headers:
            ETag:
              schema:
                type: string
              description: MD5 fingerprint of the file
            Last-Modified:
              schema:
                type: string
              description: RFC 7231 last-modified date
            Cache-Control:
              schema:
                type: string
              description: private, max-age=3600, must-revalidate
            Content-Type:
              schema:
                type: string
              description: MIME type of the asset
          content:
            "*/*":
              schema:
                type: string
                format: binary
        '302':
          description: Redirected to ActiveStorage signed blob URL
        '304':
          description: Not Modified — client already has the current version
        '403':
          description: Forbidden — resolved path escapes the permitted storage root
          content:
            "*/*":
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Asset not found or file missing from disk
          content:
            "*/*":
              schema:
                type: object
                required:
                - error
                properties:
                  error:
                    type: string
                  looked_at:
                    type: string
                    nullable: true
                    description: Absolute path that was checked
