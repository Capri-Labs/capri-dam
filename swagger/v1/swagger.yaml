  "/api/v1/folders/{id}":
    parameters:
    - name: id
      in: path
      required: true
      description: Folder ID or the string `"root"` to browse the top level
      schema:
        type: string
    - name: sort
      in: query
      required: false
      enum:
      - name
      - created_at
      - updated_at
      - size
      - type
      description: Field to sort folders & assets by. Defaults to `name`. `size` and
        `type` apply to assets only (folders fall back to `name`).
      schema:
        type: string
    - name: direction
      in: query
      required: false
      enum:
      - asc
      - desc
      description: Sort direction. Defaults to `asc`.
      schema:
        type: string
    get:
      summary: Retrieve a folder and its direct child contents
      tags:
      - Folders
      security:
      - Bearer: []
      description: |
        Returns immediate sub-folders, assets in this folder, and the breadcrumb
        trail back to root. Pass `id=root` to list all top-level items.
        Only active (non-trashed) items are returned.

        Results can be ordered with the `sort` and `direction` query parameters.
        Supported sort fields: `name`, `created_at`, `updated_at`, `size`, `type`.
        Note that `size` and `type` are asset-only fields — folders fall back to
        `name` ordering for those values.
      responses:
        '200':
          description: Folder contents returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  folders:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        slug:
                          type: string
                          nullable: true
                        description:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  assets:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        uuid:
                          type: string
                          format: uuid
                        title:
                          type: string
                        status:
                          type: string
                          example: ready
                        version:
                          type: integer
                        properties:
                          type: object
                        size:
                          type: integer
                          description: File size in bytes (from active version)
                        content_type:
                          type: string
                          nullable: true
                          example: image/jpeg
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        url:
                          type: string
                          nullable: true
                  breadcrumbs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                  sort:
                    type: object
                    properties:
                      field:
                        type: string
                        example: name
                      direction:
                        type: string
                        example: asc
        '404':
          description: Folder not found or has been deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    patch:
      summary: Rename a folder and/or update its description
      tags:
      - Folders
      security:
      - Bearer: []
      description: |
        Updates the folder `name` (rename) and/or `description`. The URL-safe
        `slug` is regenerated automatically when the name changes.
      parameters: []
      responses:
        '200':
          description: Folder updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  description:
                    type: string
                    nullable: true
                  slug:
                    type: string
                    nullable: true
                  updated_at:
                    type: string
                    format: date-time
        '404':
          description: Folder not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '422':
          description: Validation failed (e.g., blank name)
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - folder
              properties:
                folder:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Q4 Campaigns
                    description:
                      type: string
                      example: All creative assets for the Q4 push
    delete:
      summary: Move a folder to the Recycle Bin (soft delete)
      tags:
      - Folders
      security:
      - Bearer: []
      description: |
        Soft-deletes the folder by stamping `deleted_at`. A CDN invalidation job
        is dispatched to drop any cached assets under this folder from edge nodes.
        Use `POST /api/v1/folders/{id}/restore` to recover it.
      responses:
        '200':
          description: Folder moved to bin
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Folder moved to bin
