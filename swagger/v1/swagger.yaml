                  properties:
                    name:
                      type: string
                      example: Marketing Team
                    description:
                      type: string
                      example: Global marketing and content creators
                parent_id:
                  type: integer
                  nullable: true
                  description: Optional — nests this group under a parent
  "/admin/user_groups/{id}":
    parameters:
    - name: id
      in: path
      description: User Group ID
      required: true
      schema:
        type: string
    get:
      summary: Retrieves a single group with members and sub-groups
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      responses:
        '200':
          description: group retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    "$ref": "#/components/schemas/UserGroup"
        '404':
          description: group not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    patch:
      summary: Updates a group name or description
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: group updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  group:
                    type: object
        '403':
          description: forbidden — only super-admins can modify administrators group
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_group:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
