      schema:
        type: string
    get:
      summary: Retrieve explicit and inherited access-control policies for a folder
      tags:
      - Folders
      security:
      - Bearer: []
      description: |
        Returns two arrays: `explicit_policies` (rules set directly on this folder)
        and `inherited_policies` (rules propagated from ancestor folders).
        Inherited policies include `source_folder_name` and `source_folder_id`.
      responses:
        '200':
          description: Policies returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  explicit_policies:
                    type: array
                    items:
                      "$ref": "#/components/schemas/FolderPolicy"
