---
openapi: 3.0.1
info:
  title: Capri DAM API
  version: v1
  description: |
    An enterprise-grade, cloud-agnostic Digital Asset Management system designed for zero noise operations and high-scale automation.

    ### Core Capabilities
    * **Asset Lifecycle Management**: Upload, process, and retrieve media assets asynchronously.
    * **Workflow Automation**: Configurable event-driven state machines for asset approval and metadata pipelines.
    * **Operational Governance**: Granular role-based access control (RBAC), hierarchical user groups, and comprehensive administrative oversight.
    * **Cloud-Agnostic Storage**: Plug-and-play architecture supporting AWS S3, Cloudflare R2, Google Cloud Storage, and local environments.

    ### Authentication
    This API utilizes OAuth 2.0 for secure access. System-to-system integrations should utilize the Client Credentials grant type.

    1. Call `POST /oauth/token` with your `client_id` and `client_secret`.
    2. Click the **Authorize** button on this page and enter the resulting token.
  termsOfService: https://github.com/Capri-Labs/capri-dam
  contact:
    name: Ashok Pelluru | Operational Governance & Architecture
    url: https://github.com/Capri-Labs/capri-dam
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
paths:
  "/api/v1/video_profiles":
    get:
      summary: Lists all active Video Profiles
      tags:
      - Tools - Video Profiles
      security:
      - Bearer: []
      responses:
        '200':
          description: profiles retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    description:
                      type: string
                      nullable: true
                    encode_for_adaptive_streaming:
                      type: boolean
                    smart_crop_ratios:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            example: '16:9'
                          crop_ratio:
                            type: string
                            example: '16:9'
                    adaptive_streaming_warnings:
                      type: array
                      items:
                        type: string
                    folder_count:
                      type: integer
                    created_at:
                      type: string
                      format: date-time
                    updated_at:
                      type: string
                      format: date-time
    post:
      summary: Creates a new Video Profile
      tags:
      - Tools - Video Profiles
      security:
      - Bearer: []
      parameters: []
      responses:
        '201':
          description: profile created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  description:
                    type: string
                    nullable: true
                  encode_for_adaptive_streaming:
                    type: boolean
                  smart_crop_ratios:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: '16:9'
                        crop_ratio:
                          type: string
                          example: '16:9'
                  adaptive_streaming_warnings:
                    type: array
                    items:
                      type: string
                  folder_count:
                    type: integer
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
                  encoding_presets:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        video_format_codec:
                          type: string
                          enum:
                          - h264
                        width:
                          type: integer
                          nullable: true
                          description: null = auto
                        height:
                          type: integer
                        keep_aspect_ratio:
                          type: boolean
                        video_bitrate_kbps:
                          type: integer
                        frame_rate_fps:
                          type: integer
                        audio_codec:
                          type: string
                          enum:
                          - he_aac
                          - aac
                          - mp3
                        audio_bitrate_kbps:
                          type: integer
                        two_pass_encoding:
                          type: boolean
                        constant_bitrate:
                          type: boolean
                        h264_profile:
                          type: string
                          nullable: true
                          enum:
                          - baseline
                          - main
                          - high
                        audio_sampling_rate:
                          type: integer
                          nullable: true
                        advanced_params:
                          type: object
                          description: 'Custom encoding params: h264Level, keyframe,
                            minBitrate, maxBitrate, audioBitrateCustom'
                          properties:
                            h264Level:
                              type: string
                              description: 10 * h264 level, e.g. "30" for 3.0
                            keyframe:
                              type: string
                              description: 'Target keyframe interval in frames (recommended:
                                60–300)'
                            minBitrate:
                              type: string
                              description: Min bitrate in Kbps for VBR encodings
                            maxBitrate:
                              type: string
                              description: 'Max bitrate in Kbps (recommended: 2x encoding
                                bitrate)'
                            audioBitrateCustom:
                              type: string
                              description: '"true"/"false" — force constant audio
                                bitrate'
                        position:
                          type: integer
                        size_label:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
        '403':
          description: forbidden – admin only
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - video_profile
              properties:
                video_profile:
                  type: object
                  required:
                  - name
                  properties:
                    name:
                      type: string
                      example: Adaptive HD
                    description:
                      type: string
                      example: Adaptive HLS for desktop and mobile
                    encode_for_adaptive_streaming:
                      type: boolean
                      example: true
                    smart_crop_ratios:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            example: '16:9'
                          crop_ratio:
                            type: string
                            example: '16:9'
                    encoding_presets_attributes:
                      type: array
                      items:
                        type: object
                        required:
                        - name
                        - height
                        - video_bitrate_kbps
                        properties:
                          name:
                            type: string
                            example: 720p
                          video_format_codec:
                            type: string
                            example: h264
                          width:
                            type: integer
                            nullable: true
                            example:
                          height:
                            type: integer
                            example: 720
                          keep_aspect_ratio:
                            type: boolean
                            example: true
                          video_bitrate_kbps:
                            type: integer
                            example: 3000
                          frame_rate_fps:
                            type: integer
                            example: 30
                          audio_codec:
                            type: string
                            example: he_aac
                          audio_bitrate_kbps:
                            type: integer
                            example: 128
                          position:
                            type: integer
                            example: 0
