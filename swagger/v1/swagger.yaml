  "/api/v1/copilot/search":
    post:
      summary: Semantic (vector) search powered by the AI Gateway
      tags:
      - AI Copilot
      security:
      - Bearer: []
      description: |
        Translates a natural-language query into a dense vector via the AI Gateway
        (`POST /api/embed_query`) and performs an HNSW nearest-neighbour search
        using pgvector.

        Returns the top N most semantically similar assets (default 20, max 50)
        enriched with `similarity_score` (0–1, higher = closer match),
        `content_type`, `folder_name`, `tags`, and a resolved `url`.

        **Requires the Python AI Gateway to be running** (default: `localhost:8000`).
        Falls back with `503` when the gateway is unreachable.

        ## Optional params
        - `limit`        — 1–50 (default 20)
        - `content_type` — filter prefix: `"image"`, `"video"`, `"document"`, `"audio"`
      parameters: []
      responses:
        '200':
          description: Empty result when query is blank
          content:
            application/json:
              schema:
                type: object
                required:
                - query
                - count
                - results
                properties:
                  query:
                    type: string
                  count:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
        '401':
          description: Unauthenticated
        '503':
          description: AI Gateway unreachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - messages
              properties:
                query:
                  type: string
                  example: outdoor lifestyle photography with warm autumn tones
                  description: Natural-language description of the assets you are
                    looking for
                limit:
                  type: integer
                  example: 20
                  description: Maximum results to return (1–50). Defaults to 20.
                content_type:
                  type: string
                  example: image
                  description: 'Optional MIME-type prefix filter: image | video |
                    document | audio'
