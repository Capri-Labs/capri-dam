                    provider_label:
                      type: string
                      example: Cloudinary
                    endpoint:
                      type: string
                      nullable: true
                    status:
                      type: string
                      example: active
                      description: idle | active | error
                    assets_imported:
                      type: integer
                      example: 0
                    concurrency_limit:
                      type: integer
                      nullable: true
                    rps_limit:
                      type: integer
                      nullable: true
                    created_at:
                      type: string
