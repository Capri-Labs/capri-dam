  "/api/v1/ingestion_batches":
    get:
      summary: List the 50 most recent migration batches
      tags:
      - Ingestion & Migration
      security:
      - Bearer: []
      description: |
        Returns summary records for the 50 most recent ingestion batches ordered
        by `created_at DESC`. Use this to build the batch monitoring dashboard.
      responses:
        '200':
          description: Batch list returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  batches:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                          example: Cloudinary Migration — 2026-06-20 14:30
                        source_type:
                          type: string
                          example: cloudinary
                        status:
                          type: string
                          example: review_needed
                          description: initializing | extracting | transforming |
                            review_needed | committed | failed
                        started_at:
                          type: string
                          format: date-time
                        completed_at:
                          type: string
                          format: date-time
                          nullable: true
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      per_page:
                        type: integer
    post:
      summary: Initialize a new migration batch
      tags:
      - Ingestion & Migration
      security:
      - Bearer: []
      description: |
        Creates a new `IngestionBatch` record and immediately fires the
        `ExtractionWorker` Sidekiq job. The batch progresses through these states:

        `initializing` → `extracting` → `transforming` → `review_needed`

        Once in `review_needed`, a human operator reviews the batch in the
        BatchReviewWorkspace and calls `POST /commit` to approve it.
      parameters: []
      responses:
        '201':
          description: Batch created and extraction pipeline started
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  batch:
                    type: object
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - ingestion_batch
              properties:
                ingestion_batch:
                  type: object
                  required:
                  - name
                  - source_type
                  properties:
                    name:
                      type: string
                      example: Cloudinary Legacy Import
                    source_type:
                      type: string
                      example: cloudinary
                      description: cloudinary | brandfolder | bynder | ftp | http_api
                    connector_id:
                      type: integer
                      nullable: true
                      description: ID of the SystemConnector to use for credentials
                    notes:
                      type: string
                      nullable: true
                    source_credentials:
                      type: object
                      description: Provider-specific credentials map (stored encrypted).
                        Prefer using connector_id.
                      example:
                        endpoint: https://api.cloudinary.com/v1_1/mycloud
                        auth_token: sk_test_abc
  "/api/v1/ingestion_batches/stats":
    get:
      summary: Aggregate migration statistics across all batches
      tags:
      - Ingestion & Migration
      security:
      - Bearer: []
      description: |
        Returns roll-up metrics used by the ingestion dashboard: total/active/
        completed/failed batch counts, asset counts, duplicate blocks, and
        estimated storage/cost savings. Safe to poll frequently (read-only).
      responses:
        '200':
          description: Aggregate stats returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_batches:
                    type: integer
                  active_batches:
                    type: integer
                  completed_batches:
                    type: integer
                  failed_batches:
                    type: integer
                  total_assets_staged:
                    type: integer
                  total_assets_committed:
                    type: integer
                  total_duplicates_blocked:
                    type: integer
                  total_errors:
                    type: integer
                  estimated_storage_saved_gb:
                    type: number
                    format: float
                  estimated_cost_savings_usd:
                    type: number
                    format: float
  "/api/v1/ingestion_batches/{id}":
    parameters:
    - name: id
      in: path
      required: true
      description: IngestionBatch UUID
      schema:
        type: string
    delete:
      summary: Delete a failed migration batch
      tags:
      - Ingestion & Migration
      security:
      - Bearer: []
      description: Permanently removes a batch and all its ingestion items. Only batches
        in `failed` state can be deleted.
      responses:
        '200':
          description: Batch deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '422':
          description: Batch is not in failed state
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    get:
      summary: Retrieve a batch with its paginated ingestion items
      tags:
      - Ingestion & Migration
      security:
      - Bearer: []
      parameters:
      - name: status
        in: query
        required: false
        description: Filter items by status (pending | ai_processing | review_needed
          | committed | failed)
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: 'Page number (default: 1, 50 items per page)'
        schema:
          type: integer
      responses:
        '200':
          description: Batch details and items returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch:
                    type: object
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        original_filename:
                          type: string
                        file_hash:
                          type: string
                          description: SHA-256 hash
                        file_size:
                          type: integer
                        status:
                          type: string
                        error_log:
                          type: string
                          nullable: true
                        legacy_metadata:
                          type: object
                          nullable: true
                        clean_properties:
                          type: object
                          nullable: true
                        created_at:
                          type: string
                          format: date-time
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      per_page:
                        type: integer
                        example: 50
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/v1/ingestion_batches/{id}/commit":
    parameters:
    - name: id
      in: path
      required: true
      description: IngestionBatch ID
      schema:
        type: integer
    post:
      summary: Human-approve and commit a batch to the DAM
      tags:
      - Ingestion & Migration
      security:
      - Bearer: []
      description: |
        Transitions the batch from `review_needed` to `committed` and fires the
        `MigrationCommitWorker` to physically import all approved assets.
        Can only be called when `status == review_needed`. You will receive
        an email notification when the import is complete.
      responses:
        '200':
          description: Commit pipeline started
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  batch:
                    type: object
        '422':
          description: Batch is not in review_needed state
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/v1/ingestion_batches/{id}/abort":
    parameters:
    - name: id
      in: path
      required: true
      description: IngestionBatch ID
      schema:
        type: integer
    post:
      summary: Abort a migration batch without committing
      tags:
      - Ingestion & Migration
      security:
      - Bearer: []
      description: Sets the batch status to `failed`. Cannot be called on already-committed
        batches.
      responses:
        '200':
          description: Batch aborted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  batch:
                    type: object
        '422':
          description: Cannot abort a committed batch
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/v1/ingestion_batches/{id}/report":
    parameters:
    - name: id
      in: path
      required: true
      description: IngestionBatch ID
      schema:
        type: integer
    get:
      summary: Retrieve or generate the migration statistics report for a batch
      tags:
      - Ingestion & Migration
      security:
      - Bearer: []
      description: |
        Returns pre-computed migration stats (success count, failure count, TDM
        quality scores, duplicate rates). If the report has not been generated yet
        on a committed batch, a `202 Accepted` is returned and report generation
        is queued in the background via `MigrationReportWorker`.
      responses:
        '200':
          description: Report returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch:
                    type: object
                  report:
                    type: object
                    description: Migration statistics snapshot
        '202':
          description: Report is being generated — check back shortly
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/v1/ingestion_items/{id}":
    parameters:
    - name: id
      in: path
      required: true
      description: IngestionItem database ID
      schema:
        type: integer
    get:
      summary: Retrieve a single ingestion item
      tags:
      - Ingestion & Migration
      description: |
        **Internal microservice endpoint.** Called by the TDM sanitation and AI
        enrichment workers to fetch the raw item data for processing.
      responses:
        '200':
          description: Ingestion item returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  ingestion_batch_id:
                    type: integer
                  original_filename:
                    type: string
                  file_hash:
                    type: string
                  file_size:
                    type: integer
                  status:
                    type: string
                    example: pending
                  error_log:
                    type: string
                    nullable: true
                  legacy_metadata:
                    type: object
                    nullable: true
                  clean_properties:
                    type: object
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    patch:
      summary: Update the status and clean properties of an ingestion item
      tags:
      - Ingestion & Migration
      description: |
        **Internal microservice endpoint.** Called by the AI enrichment worker
        to update `status` (e.g. from `ai_processing` to `review_needed`) and to
        write the sanitized `clean_properties` back to the database.

        When all items in a batch transition out of `pending`/`ai_processing`,
        the system automatically sets `batch.status = review_needed`.
      parameters: []
      responses:
        '200':
          description: Item updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - ingestion_item
              properties:
                ingestion_item:
                  type: object
                  properties:
                    status:
                      type: string
                      example: review_needed
                      description: pending | ai_processing | review_needed | committed
                        | failed
                    error_log:
                      type: string
                      nullable: true
                    clean_properties:
                      type: object
                      description: Sanitized/enriched metadata ready for import into
                        DAM
