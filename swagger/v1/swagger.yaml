                  - name
                  - trigger_type
              required:
              - workflow
  "/workflows/{id}":
    parameters:
    - name: id
      in: path
      description: Workflow ID
      required: true
      schema:
        type: string
    get:
      summary: Retrieves details of a specific workflow definition
      tags:
      - Workflow Definitions
      security:
      - Bearer: []
      responses:
        '200':
          description: workflow details retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  graph_data:
                    type: object
                  workflow_steps:
                    type: array
                    items:
                      type: object
    patch:
      summary: Updates an existing workflow definition
      tags:
      - Workflow Definitions
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: workflow updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  workflow:
                    type: object
                    properties:
                      workflow_steps:
                        type: array
                        items:
                          type: object
        '422':
          description: update failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                workflow:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
                    graph_data:
                      type: object
                    workflow_steps_attributes:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                            description: Existing step ID for updates
                          title:
                            type: string
                          _destroy:
                            type: boolean
                            description: Mark for deletion
    delete:
      summary: Deletes a workflow definition
      tags:
      - Workflow Definitions
      security:
      - Bearer: []
      responses:
        '200':
          description: workflow deleted
