      summary: Upsert pgvector embedding for an asset (AI Gateway callback)
      tags:
      - Assets
      security:
      - Bearer: []
      description: |
        **Internal microservice endpoint.** Called by the Python AI Gateway after
        computing the vector embedding. Stores the result in `asset_embeddings`
        for HNSW nearest-neighbour semantic search via pgvector.
      parameters: []
      responses:
        '200':
          description: Vector spatial index updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Vector spatial index updated
                required:
                - message
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                    example:
                    - Embedding can't be blank
                required:
                - errors
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Record not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - asset_embedding
              properties:
                asset_embedding:
                  type: object
                  required:
                  - embedding
                  - model_name
                  properties:
                    embedding:
                      type: array
                      items:
                        type: number
                      example:
                      - 0.023
                      - -0.114
                      - 0.987
                      description: 1536-dimension float vector
                    model_name:
                      type: string
                      example: text-embedding-ada-002
    parameters:
    - name: asset_id
      in: path
      required: true
      description: Asset ID
      schema:
        type: string
  "/api/v1/search":
    get:
      summary: Search assets (lexical + dynamic metadata facets)
      tags:
      - Assets
      security:
      - Bearer: []
      description: |
        Performs full-text lexical search against asset titles and original filenames.
        Supports dynamic metadata filtering via arbitrary query params (e.g. `?region=EMEA`).
        Returns facet data alongside results so UIs can build filter panels without extra calls.
      parameters:
      - name: q
        in: query
        required: false
        description: Full-text term matched against title and original_filename
        schema:
          type: string
      - name: mode
        in: query
        required: false
        description: 'Filter by type: `images` (default), `files`, or omit for all'
        schema:
          type: string
      responses:
        '200':
          description: Search results with facets returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      query:
                        type: string
                        nullable: true
                        example: brand logo
                      mode:
                        type: string
                        example: images
                      total_found:
                        type: integer
                        example: 47
                      facets:
                        type: object
                        properties:
                          content_type:
                            type: array
                            items:
                              type: string
                            example:
                            - image/jpeg
                            - image/png
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        uuid:
                          type: string
                          format: uuid
                        title:
                          type: string
                          example: Brand Logo Final
                        type:
                          type: string
                          example: image/png
                        size:
                          type: string
                          example: 2.4 MB
                        thumb_url:
                          type: string
                          nullable: true
  "/api/v1/assets":
    post:
      summary: Upload a new asset (multipart)
      tags:
      - Assets
      security:
      - Bearer: []
      description: |
        Accepts a multipart file and immediately queues async processing
        (`AssetProcessorWorker`, `CdnInvalidationWorker`, `EdgeMetadataSyncWorker`).

        **Lifecycle**: `status: pending` → background workers → `status: ready`.
        Poll `GET /api/v1/assets/{id}/versions` to monitor progress.
      parameters: []
      responses:
        '202':
          description: Asset accepted and queued for processing
          content:
            application/json:
              schema:
                type: object
                required:
                - id
                - status
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: processing
        '422':
          description: No file provided
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: string
        required: true
        description: Binary file to upload
  "/api/v1/assets/{id}":
    parameters:
    - name: id
      in: path
      required: true
      description: Asset database ID (integer primary key)
      schema:
        type: string
    delete:
      summary: Soft-delete an asset (move to Recycle Bin)
      tags:
      - Assets
      security:
      - Bearer: []
      description: Sets `deleted_at`. Recoverable via restore or permanently via permanent
        delete.
      responses:
        '200':
          description: Asset moved to bin
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
