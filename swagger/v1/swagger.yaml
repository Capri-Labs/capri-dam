      summary: Retrieves all user groups with hierarchy metadata
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      responses:
        '200':
          description: user groups retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_groups:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        slug:
                          type: string
                          nullable: true
                        description:
                          type: string
                          nullable: true
                        is_system:
                          type: boolean
                        parent_id:
                          type: integer
                          nullable: true
                        member_count:
                          type: integer
    post:
      summary: Creates a new user group
      tags:
      - Admin - User Groups
      security:
      - Bearer: []
      parameters: []
      responses:
        '201':
          description: user group created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  group:
                    "$ref": "#/components/schemas/UserGroup"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - user_group
              properties:
                user_group:
                  type: object
                  required:
