  "/api/v1/assets/{id}/process_image":
    parameters:
    - name: id
      in: path
      required: true
      description: Asset ID
      schema:
        type: string
    post:
      summary: Process image with adjustments (brightness, contrast, saturation, geometry)
      tags:
      - Assets
      security:
      - Bearer: []
      description: |
        Applies adjustments (brightness, contrast, saturation) and geometric transformations
        (rotation, flips) to an image using the ImageProcessingService. Supports multiple
        save modes: `new` (creates asset), `version` (creates new version), `overwrite` (replaces current).
      parameters:
      - name: id
        in: path
        required: true
        description: Asset UUID
        schema:
          type: string
      - name: adjustments
        in: query
        type: object
        required: false
        schema:
          type: object
          properties:
            brightness:
              type: integer
              example: 20
              description: 'Range: -100 to 100'
            contrast:
              type: integer
              example: -15
              description: 'Range: -100 to 100'
            saturation:
              type: integer
              example: 30
              description: 'Range: -100 to 100'
        description: Image adjustment parameters
      - name: geometry
        in: query
        type: object
        required: false
        schema:
          type: object
          properties:
            rotate:
              type: integer
              example: 90
              description: Rotation degrees
            flip_horizontal:
              type: boolean
              example: false
            flip_vertical:
              type: boolean
              example: false
            focal_point:
              type: object
              properties:
                x:
                  type: number
                  example: 50.0
                "y":
                  type: number
                  example: 50.0
        description: Geometric transformation parameters
      - name: crop_aspect
        in: query
        required: false
        example: free
        description: Crop aspect ratio (e.g., "free", "16:9", "4:3")
        schema:
          type: string
      - name: filter
        in: query
        required: false
        example: None
        description: Image filter to apply
        schema:
          type: string
      - name: custom_cli
        in: query
        required: false
        description: Raw ImageMagick CLI flags (e.g., "-monochrome -charcoal 2")
        schema:
          type: string
      - name: save_mode
        in: query
        required: false
        enum:
        - new
        - version
        - overwrite
        example: version
        description: "Where to save: `new` (create asset), `version` (new version),
          `overwrite` (replace):\n * `new` \n * `version` \n * `overwrite` \n "
        schema:
          type: string
      - name: target_folder_id
        in: query
        required: false
        description: 'Folder ID to move output to (save_mode: new only)'
        schema:
          type: integer
      responses:
        '200':
          description: Image processed and version created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  uuid:
                    type: string
                    format: uuid
                  title:
                    type: string
                  version:
                    type: integer
                    example: 2
                  metadata:
                    type: object
                  url:
                    type: string
                    nullable: true
                  storage_path:
                    type: string
                  file_size:
                    type: integer
                required:
                - id
                - version
        '201':
          description: 'New asset created with processed image (save_mode: new)'
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  uuid:
                    type: string
                    format: uuid
                  title:
                    type: string
                    example: Brand Logo Final (Copy)
                  version:
                    type: integer
                  metadata:
                    type: object
                  url:
                    type: string
                    nullable: true
                required:
                - id
        '422':
          description: Validation error or source file missing
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Invalid image parameters: brightness must be between
                      -100 and 100'
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Asset not found.
