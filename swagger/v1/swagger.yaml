  "/api/v1/assets/check_hashes":
    post:
      summary: Pre-upload duplicate detection via SHA-256 checksums
      tags:
      - Assets
      security:
      - Bearer: []
      description: |
        Compute SHA-256 checksums client-side **before** uploading, then call this
        endpoint to detect existing duplicates. Returns matching asset details so
        the UI can warn the user before creating redundant copies.
      parameters: []
      responses:
        '200':
          description: Duplicate check complete (empty `duplicates` object when none
            found)
          content:
            application/json:
              schema:
                type: object
                properties:
                  duplicates:
                    type: object
                    description: Key = SHA-256 hash; value = array of matching asset
                      records
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          title:
                            type: string
                          version:
                            type: integer
                          url:
                            type: string
                            nullable: true
                          folderName:
                            type: string
                            example: "/Marketing/Campaigns"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - hashes
              properties:
                hashes:
                  type: array
                  items:
                    type: string
                  example:
                  - a1b2c3d4e5f6...
                  - e5f6g7h8i9j0...
                  description: Array of SHA-256 hex strings to check
