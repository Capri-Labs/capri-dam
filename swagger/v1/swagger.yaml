                      type: boolean
  "/api/v1/ai_configuration":
    get:
      summary: Retrieve the current AI Gateway configuration
      tags:
      - CDN & Settings
      security:
      - Bearer: []
      description: |
        Returns the singleton `AiConfiguration` record. This controls which
        provider and model the AI Gateway uses for text generation and embedding.
      responses:
        '200':
          description: AI configuration returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  active_provider:
                    type: string
                    example: openai
                    description: openai | anthropic | local
                  generation_model:
                    type: string
                    example: gpt-4o
                  embedding_model:
                    type: string
                    example: text-embedding-ada-002
                  monthly_budget_usd:
                    type: number
                    example: 200.0
                  system_prompt:
                    type: string
                    nullable: true
                  fallback_to_local:
                    type: boolean
                    example: false
    patch:
      summary: Update the AI Gateway configuration
      tags:
      - CDN & Settings
      security:
      - Bearer: []
      description: |
        Updates the singleton AI configuration. Changes take effect immediately
        for all subsequent AI Gateway calls. Set `fallback_to_local: true` to
        use a locally-hosted LLM when the primary provider is unavailable.
      parameters: []
      responses:
        '200':
          description: AI Gateway configuration synchronized
          content:
            application/json:
              schema:
                type: object
