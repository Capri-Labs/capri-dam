          description: Folder not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    post:
      summary: Upsert an access-control policy for a group on a folder
      tags:
      - Folders
      security:
      - Bearer: []
      description: |
        Creates or updates the permission matrix for a user group on this folder.
        Pass `cascade: true` to enqueue background propagation to all child folders.
        Requires the calling user to have `manage_access` on the folder (or be an admin).
      parameters: []
      responses:
        '200':
          description: Policy saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  policy:
                    "$ref": "#/components/schemas/FolderPolicy"
        '403':
          description: Insufficient permission
        '404':
          description: Folder or group not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - group_id
              properties:
                group_id:
                  type: integer
                  description: UserGroup ID
                read_access:
                  type: boolean
                modify_access:
                  type: boolean
                create_access:
                  type: boolean
                delete_access:
                  type: boolean
                replicate_access:
                  type: boolean
                manage_access:
                  type: boolean
                explicit_deny:
                  type: boolean
                cascade:
                  type: boolean
                  description: When true, propagate to all child folders in the background
