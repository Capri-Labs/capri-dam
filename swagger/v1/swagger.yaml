                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '422':
          description: deletion failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
  "/workflows/{id}/toggle_status":
    parameters:
    - name: id
      in: path
      description: Workflow ID
      required: true
      schema:
        type: integer
    patch:
      summary: Activates or deactivates a workflow definition
      tags:
      - Workflow Definitions
      security:
      - Bearer: []
      responses:
        '200':
          description: status toggled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status:
                    type: string
                    enum:
                    - active
                    - inactive
                    - draft
        '422':
          description: toggle failed — could not save
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
