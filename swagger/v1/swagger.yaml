          description: Not found
    patch:
      summary: Update a metadata schema
      tags:
      - Metadata Schemas
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: Schema updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/MetadataSchema"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
