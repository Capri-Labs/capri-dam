          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    patch:
      summary: Updates a Video Profile
      tags:
      - Tools - Video Profiles
      security:
      - Bearer: []
      parameters: []
      responses:
        '200':
          description: profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  description:
                    type: string
                    nullable: true
                  encode_for_adaptive_streaming:
                    type: boolean
                  smart_crop_ratios:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: '16:9'
                        crop_ratio:
                          type: string
