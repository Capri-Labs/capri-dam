      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                storage_config:
                  type: object
                  properties:
                    provider:
                      type: string
                      enum:
                      - aws
                      - cloudflare
                      - digitalocean
                      - google
                      example: cloudflare
                    region:
                      type: string
                      example: auto
                    access_key:
                      type: string
                      example: KXA01BC2...
                    secret_key:
                      type: string
                      example: "********"
                      description: Will not overwrite if passed as masking placeholder
                    bucket:
                      type: string
                      example: dam-production-assets
                    endpoint:
                      type: string
                      nullable: true
                      example: https://<accountid>.r2.cloudflarestorage.com
                  required:
                  - provider
