# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"

  public:
    collection_shares:
      meta_title: "%{name} — Shared Collection"
      read_only_badge: "Shared, read-only view"
      description_fallback: "No description provided."
      empty_state: "This collection has no assets yet."
      no_preview: "No preview available"
      asset_count:
        one: "%{count} asset"
        other: "%{count} assets"
      invalid:
        title: "This link is invalid or has expired"
        body: "The share link you followed is no longer valid. Ask the person who shared it with you for a new link."
        meta_title: "Link expired — Capri DAM"

  errors:
    messages:
      invalid: "is invalid"
      taken: "has already been taken"
      too_short: "is too short (minimum is %{count} characters)"
      too_long: "is too long (maximum is %{count} characters)"
      wrong_length: "is the wrong length (should be %{count} characters)"
  
  activerecord:
    errors:
      models:
        asset:
          attributes:
            base:
              file_missing: "Source file not found on disk"
  
  api:
    errors:
      image_processing:
        asset_not_found: "Asset not found"
        source_file_not_found: "Source file not found on disk"
        processing_failed: "Image processing failed. Please try again"
        invalid_parameters: "Invalid image parameters"
        invalid_brightness: "Brightness must be between -100 and 100"
        invalid_contrast: "Contrast must be between -100 and 100"
        invalid_saturation: "Saturation must be between -100 and 100"
        invalid_rotation: "Rotation must be divisible by 90 degrees"
        invalid_crop_aspect: "Crop aspect must be one of: free, 1:1, 16:9, 4:3, 3:2, 21:9"
        invalid_filter: "Filter must be one of the available filters"
        invalid_focal_point: "Focal point coordinates must be between 0 and 100"
        invalid_output_format: "Output format is not supported"
        invalid_quality: "Quality must be between 1 and 100"
        file_too_large: "Source file exceeds maximum size"
        network_error: "Network error occurred"
