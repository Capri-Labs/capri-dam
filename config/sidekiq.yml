---
:concurrency: 25
:queues:
  # Format is [queue_name, weight]
  # Higher weight = checked more frequently

  # Critical Priority (Fast, User-Facing)
  - [mailers, 5]       # Password resets and auth emails must go out instantly
  - [notifications, 5] # Inbox tasks and UI alerts

  # Standard Priority
  - [default, 3]       # Standard application jobs

  # Medium Priority (System Processing)
  - [workflow, 2]      # Transitioning states, creating audit logs
  - [metadata, 2]      # AI tagging, EXIF extraction
  - [smartai, 2]      # AI tagging, EXIF extraction

  # Low Priority (Heavy CPU/Memory, Background Tasks)
  - [reports, 1]       # PDF/Excel generation
  - [ingest, 1]        # 50k batch uploads