name: capri-dam-integration

# Start: docker compose -f docker-compose.integration.yml up -d --wait
# Down:  docker compose -f docker-compose.integration.yml down -v

services:
  db:
    image: pgvector/pgvector:pg14
    environment:
      POSTGRES_USER: capri
      POSTGRES_PASSWORD: capri
      POSTGRES_DB: headless_dam_integration
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capri -d headless_dam_integration"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
