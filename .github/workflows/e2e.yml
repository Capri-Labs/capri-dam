# ─────────────────────────────────────────────────────────────────────────────
# Capri DAM — E2E Tests (Playwright)
#
# Runs the full Playwright end-to-end suite against a live Rails server
# (spun up inside the workflow using Docker Compose-style services).
#
# Triggers:
#   - Push to main/master
#   - Pull-request (as a required check)
#   - Manual dispatch (with optional base URL override)
#
# Required secrets:
#   RAILS_MASTER_KEY    — Rails credentials key
#   E2E_EMAIL           — Admin login for tests (default: admin@admin.com)
#   E2E_PASSWORD        — Admin password
# ─────────────────────────────────────────────────────────────────────────────
name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to run E2E against (default: http://localhost:3000)"
        required: false
        default: "http://localhost:3000"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUBY_VERSION: "4.0.3"
  NODE_VERSION: "22"
  BUNDLE_WITHOUT: "production"
  RAILS_ENV: test
  DATABASE_URL: postgres://headless_dam:headless_dam@localhost:5432/headless_dam_e2e
  REDIS_URL: redis://localhost:6379/0
  E2E_BASE_URL: ${{ inputs.base_url || 'http://localhost:3000' }}

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg14
        env:
          POSTGRES_USER: headless_dam
          POSTGRES_PASSWORD: headless_dam
          POSTGRES_DB: headless_dam_e2e
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev libvips node-gyp exiv2 imagemagick

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Ruby ${{ env.RUBY_VERSION }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium

      - name: Build JS assets
        run: yarn build

      - name: Prepare E2E database & seed
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          SECRET_KEY_BASE: ${{ secrets.RAILS_MASTER_KEY || 'ci_e2e_placeholder_secret_key_base_that_is_at_least_64_chars_long_required' }}
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: test-ar-enc-primary-key-32bytes!
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: test-ar-enc-det-key-32bytes!!!!!
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: test-ar-enc-derivation-salt32b!!
        run: |
          bundle exec rails db:create
          bundle exec rails db:migrate
          bundle exec rails db:seed

      - name: Start Rails server in background
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          SECRET_KEY_BASE: ${{ secrets.RAILS_MASTER_KEY || 'ci_e2e_placeholder_secret_key_base_that_is_at_least_64_chars_long_required' }}
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: test-ar-enc-primary-key-32bytes!
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: test-ar-enc-det-key-32bytes!!!!!
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: test-ar-enc-derivation-salt32b!!
        run: |
          # Bind to 0.0.0.0 so the health-check curl can reach it
          bundle exec rails server -b 0.0.0.0 -p 3000 -e test > /tmp/rails-server.log 2>&1 &
          SERVER_PID=$!
          echo "Rails server PID: $SERVER_PID"
          # Wait up to 90 s (45 × 2 s) for the /up health-check to respond
          for i in $(seq 1 45); do
            if curl -sf --max-time 2 http://localhost:3000/up; then
              echo "Rails server is ready (attempt $i)"
              break
            fi
            # If the process already exited, bail out early
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "::error::Rails server process exited unexpectedly (attempt $i)"
              break
            fi
            echo "Waiting for server... attempt $i/45"
            sleep 2
          done
          # Hard-fail the step if the server still isn't answering
          if ! curl -sf --max-time 2 http://localhost:3000/up; then
            echo "::error::Rails server did not start within 90 s"
            echo "=== Last 100 lines of server log ==="
            tail -100 /tmp/rails-server.log || true
            exit 1
          fi

      - name: Run Playwright tests
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL || 'admin@admin.com' }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD || 'AdminUser' }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          SECRET_KEY_BASE: ${{ secrets.RAILS_MASTER_KEY || 'ci_e2e_placeholder_secret_key_base_that_is_at_least_64_chars_long_required' }}
        run: yarn playwright test --reporter=html

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: coverage-frontend/playwright-report/
          retention-days: 30

      - name: Upload E2E screenshots on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-screenshots
          path: coverage-frontend/playwright-report/
          if-no-files-found: ignore

