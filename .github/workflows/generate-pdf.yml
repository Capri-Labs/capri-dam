# ─────────────────────────────────────────────────────────────────────────────
# Capri DAM — Architecture PDF artifact (standalone, no Pages deploy)
#
# NOTE: GitHub Pages deployment is now handled by main.yml which builds the
# complete multi-section site (root hub + architecture + developer-guide +
# product-info).  This workflow only produces a downloadable PDF artifact.
#
# Triggers: docs/architecture/** changes on main/master, or workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────────
name: Architecture PDF

on:
  push:
    branches: [main, master]
    paths:
      - "docs/architecture/**"
      - ".github/workflows/generate-pdf.yml"
  workflow_dispatch:

concurrency:
  group: architecture-pdf-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-architecture-pdf:
    name: Build architecture PDF artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            default-jre \
            graphviz
          # Download PlantUML JAR directly — more reliable than the apt package.
          # asciidoctor-diagram >= 3.x reads DIAGRAM_PLANTUML_CLASSPATH.
          curl -fsSL -o /tmp/plantuml.jar \
            https://github.com/plantuml/plantuml/releases/download/v1.2024.8/plantuml-1.2024.8.jar

      - name: Install Asciidoctor + plugins
        run: |
          sudo gem install \
            asciidoctor \
            asciidoctor-diagram \
            asciidoctor-diagram-plantuml \
            asciidoctor-pdf \
            rouge \
            --no-document

      - name: Create output directory
        run: mkdir -p docs/architecture/output

      # ── HTML (arc42 theme) ──────────────────────────────────────────────────
      - name: Generate HTML documentation
        env:
          DIAGRAM_PLANTUML_CLASSPATH: /tmp/plantuml.jar
        run: |
          asciidoctor \
            -r asciidoctor-diagram \
            -b html5 \
            -a toc=left \
            -a toclevels=4 \
            -a sectnums \
            -a icons=font \
            -a source-highlighter=rouge \
            -a rouge-style=github \
            -a allow-uri-read \
            -a imagesoutdir=docs/architecture/output/images \
            -a stylesdir=docs/architecture/theme \
            -a stylesheet=arc42.css \
            -a docinfodir=docs/architecture \
            -a docinfo=shared \
            -D docs/architecture/output \
            -o index.html \
            docs/architecture/index.adoc

      # ── PDF ────────────────────────────────────────────────────────────────
      - name: Generate PDF documentation
        env:
          DIAGRAM_PLANTUML_CLASSPATH: /tmp/plantuml.jar
        run: |
          asciidoctor-pdf \
            -r asciidoctor-diagram \
            -a allow-uri-read \
            -a pdf-themesdir=docs/architecture/theme \
            -a pdf-theme=arc42 \
            -o headless-dam-architecture.pdf \
            docs/architecture/index.adoc

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: architecture-pdf
          path: headless-dam-architecture.pdf

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: architecture-html
          path: docs/architecture/output/

