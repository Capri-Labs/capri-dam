name: 🐛 Bug report
description: Report a problem so we can fix it
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
        Please search [existing issues](../issues) before opening a new one.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I PATCH /profile/preferences …
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output / response
      description: Paste any error output. This will be automatically formatted as code.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      placeholder: v2.4.1 or git SHA
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - REST API (/api/v1)
        - GraphQL API (/graphql)
        - Web UI (React)
        - Background jobs (Sidekiq)
        - Auth / SSO
        - Storage / assets
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Ruby/Node version
      placeholder: macOS 15, Chrome 126, Ruby 4.0.3, Node 22.16.0

