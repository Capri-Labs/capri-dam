name: ✨ Feature request
description: Suggest an idea or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Describe the **problem** you are
        solving, not just the solution — it helps us find the best approach.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is your feature request related to a problem? Describe it.
      placeholder: I'm frustrated when …
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - REST API (/api/v1)
        - GraphQL API (/graphql)
        - Web UI (React)
        - Background jobs (Sidekiq)
        - Auth / SSO
        - Storage / assets
        - Docs
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, or anything else that helps.

